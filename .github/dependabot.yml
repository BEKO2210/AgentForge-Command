version: 2
updates:
  - package-ecosystem: npm
    directory: /gui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, gui]

  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, mcp]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
