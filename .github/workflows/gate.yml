name: gate

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: bash + shellcheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show tool versions
        run: |
          bash --version | head -1
          git --version
          node --version
          (command -v shellcheck && shellcheck --version | head -2) || echo "shellcheck not installed"

      # The server-integration suite (tests/server-suite.mjs) spawns the
      # real gui server, which imports node-pty + ws from gui/node_modules.
      # node-pty is a native module — we MUST run install scripts so the
      # prebuilt binary lands on disk. (--ignore-scripts works for the
      # audit job below, but not here: it leaves the .node file unbuilt
      # and the runtime import throws.)
      - name: Install gui dependencies (for server integration suite)
        working-directory: gui
        run: npm ci

      - name: Verify native modules loaded
        working-directory: gui
        run: node -e "import('node-pty').then(()=>console.log('node-pty ok')).catch(e=>{console.error('node-pty FAIL:',e.message);process.exit(1)})"

      - name: Run the green gate (bash -n + shellcheck + tests/run.sh)
        run: scripts/team-check.sh

  audit:
    name: npm audit (gui + mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit gui dependencies
        working-directory: gui
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - name: Audit mcp dependencies
        working-directory: mcp
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high
