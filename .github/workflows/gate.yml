name: gate

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Deep gate: lint + the full test suite incl. PTY-integration + the bash
  # coordination-kit tests. PTYs/bash are reliable on Linux (the supported
  # runtime; Windows users run via Docker/WSL — see docs/INSTALL.md), so the
  # heavy integration runs here across every supported Node version.
  gate:
    name: gate (ubuntu · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Tool versions
        run: |
          bash --version | head -1; git --version; node --version
          (command -v shellcheck && shellcheck --version | head -2) || echo "shellcheck not installed (optional)"
      - name: Install gui deps (builds node-pty)
        working-directory: gui
        run: npm ci
      - name: Verify native module loads
        working-directory: gui
        run: node -e "import('node-pty').then(()=>console.log('node-pty ok')).catch(e=>{console.error('node-pty FAIL:',e.message);process.exit(1)})"
      - name: Green gate (bash -n + shellcheck + tests/run.sh)
        run: bash scripts/team-check.sh

  # Cross-platform build + portable smoke: proves node-pty's NATIVE BUILD and
  # load on every OS × Node combo (ROADMAP Befund #5), plus the pure-Node unit
  # tests, benchmark and schema check. No PTY/bash-kit here — those are the
  # gate's job on Linux. This is the broad "it builds everywhere" assurance.
  build:
    name: build (${{ matrix.os }} · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install gui deps (builds node-pty natively)
        working-directory: gui
        run: npm ci
      - name: Verify native module loads
        working-directory: gui
        run: node -e "import('node-pty').then(()=>console.log('node-pty ok')).catch(e=>{console.error('node-pty FAIL:',e.message);process.exit(1)})"
      - name: Portable unit tests (no PTY)
        run: |
          node tests/arena-suite.mjs
          node tests/validate-schema.mjs
          node tests/perf-bench.mjs

  audit:
    name: npm audit (gui + mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Audit gui dependencies
        working-directory: gui
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high
      - name: Audit mcp dependencies
        working-directory: mcp
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

  e2e:
    name: Playwright E2E (Harness Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install (root workspaces + dev tooling)
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E + a11y
        run: npm run test:e2e

  coverage:
    name: Coverage (c8 threshold)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install (root workspaces)
        run: npm ci
      - name: Run coverage (enforces .c8rc.json thresholds)
        run: npm run coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
