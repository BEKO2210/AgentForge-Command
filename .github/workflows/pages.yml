name: pages

# Publishes the static project landing page (site/) to GitHub Pages.
# NOTE: the cockpit itself is a local app (it needs the Node server), so this
# is a marketing/landing page — not a live, interactive cockpit. To enable:
# repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: ["main"]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v5
