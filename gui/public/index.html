<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TEAM // CONSOLE · 4-Agent Claude Code</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Font pairing per UI Pro Max "Developer Mono" guidance: JetBrains Mono + IBM Plex Sans -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Surfaces — refined per UI Pro Max "Developer Tool / IDE" palette,
       deeper background, cleaner slate panels. */
    --bg:#05080f; --bg2:#0a0f1c; --panel:#0d1424; --panel2:#0b1120;
    --border:#1a2540; --border2:#2a3552;
    --fg:#f1f5fb; --muted:#8a96b0; --dim:#6b7591;
    /* --accent stays sky-blue (interactive borders/focus/rings).
       --cta is new: "run green" used only for the primary action button. */
    --accent:#5b8cff; --cta:#22c55e; --cta2:#34d399;
    --good:#54e6a8; --warn:#ffcf5c; --bad:#ff6b7d; --idle:#8a93ad;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --ui:"IBM Plex Sans",ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;
    --lead:#f5b94a; --backend:#36d6c3; --frontend:#f06bd2; --quality:#7ee787;
  }
  /* Consistent focus-visible per UX guideline "Focus States" (High) */
  *:focus-visible { outline:2px solid var(--accent); outline-offset:2px;
                    border-radius:6px; }
  button:focus-visible { outline-offset:3px; }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  html { background:#06080d; }
  body {
    margin:0; color:var(--fg); font:14px/1.45 var(--ui);
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(91,140,255,.10), transparent 60%),
      radial-gradient(800px 520px at 100% 0%, rgba(240,107,210,.07), transparent 55%),
      linear-gradient(var(--bg), var(--bg2));
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* faint grid texture overlay */
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5; z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:42px 42px; mask-image:radial-gradient(circle at 50% 0%,#000,transparent 85%);
  }
  body > * { position:relative; z-index:1; }

  /* ---------- app bar ---------- */
  .appbar { display:flex; align-items:center; gap:14px; padding:12px 18px;
            border-bottom:1px solid var(--border); background:rgba(8,11,18,.72);
            backdrop-filter:blur(8px); flex-wrap:wrap; }
  .brand { display:flex; flex-direction:column; align-items:flex-start; gap:1px;
           font-family:var(--mono); white-space:nowrap; user-select:none; }
  .brand .row1 { display:flex; align-items:baseline; gap:2px; font-weight:700;
                 letter-spacing:.5px; font-size:15px; }
  .brand .b1 { color:var(--fg); } .brand .b2 { color:var(--accent); }
  .brand .caret { width:8px; height:16px; margin-left:4px; background:var(--accent);
                  display:inline-block; transform:translateY(2px); animation:blink 1.1s steps(1) infinite; }
  /* "Channel status" subscript — gives the brand a small ops-console signature. */
  .brand .sub { font:700 9px var(--mono); letter-spacing:1.4px; text-transform:uppercase;
                color:var(--dim); margin-top:1px; }
  .brand .sub .ok { color:var(--good); }
  @keyframes blink { 50% { opacity:0; } }

  #goal { flex:1 1 280px; min-width:200px; height:38px; max-height:96px; resize:vertical;
          background:var(--panel); color:var(--fg); border:1px solid var(--border2);
          border-radius:9px; padding:9px 12px; font:13px/1.4 var(--ui); transition:border-color .15s,box-shadow .15s; }
  #goal:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,140,255,.18); }

  .btn { font:600 13px/1 var(--ui); color:var(--fg); background:var(--panel); cursor:pointer;
         border:1px solid var(--border2); border-radius:9px; padding:10px 14px; white-space:nowrap;
         transition:border-color .15s,background .15s,transform .06s,color .15s; }
  .btn:hover { border-color:var(--accent); color:#fff; }
  .btn:active { transform:translateY(1px); }
  /* CTA = "run green" per UI Pro Max Developer Tool palette — distinct
     from the blue interactive accent so the primary action reads at a glance. */
  .btn.primary { color:#04140a; background:linear-gradient(180deg,var(--cta2),var(--cta));
                 border-color:var(--cta2);
                 box-shadow:0 6px 20px -8px rgba(34,197,94,.7),
                            inset 0 1px 0 rgba(255,255,255,.18); }
  .btn.primary:hover { filter:brightness(1.08); color:#04140a; }
  .btn.primary.flash { animation:ctaFlash .55s ease-out; }
  @keyframes ctaFlash {
    0%   { box-shadow:0 0 0 0 var(--cta), 0 6px 20px -8px rgba(34,197,94,.7); }
    60%  { box-shadow:0 0 0 8px rgba(34,197,94,0), 0 6px 20px -8px rgba(34,197,94,.7); }
    100% { box-shadow:0 0 0 0 rgba(34,197,94,0), 0 6px 20px -8px rgba(34,197,94,.7); }
  }
  .conn { display:flex; align-items:center; gap:7px; color:var(--muted); font:600 12px var(--mono); }
  .conn .pulse { width:9px; height:9px; border-radius:50%; background:var(--dim); position:relative; }
  .conn .pulse.on { background:var(--good); box-shadow:0 0 0 0 rgba(84,230,168,.6); animation:ring 1.8s infinite; }
  .conn .pulse.off { background:var(--bad); }
  @keyframes ring { 0%{box-shadow:0 0 0 0 rgba(84,230,168,.5);} 70%{box-shadow:0 0 0 7px rgba(84,230,168,0);} 100%{box-shadow:0 0 0 0 rgba(84,230,168,0);} }

  /* ---------- vitals strip ---------- */
  .vitals { display:flex; align-items:flex-start; gap:20px; padding:11px 18px;
            border-bottom:1px solid var(--border); background:rgba(10,14,22,.5); flex-wrap:wrap; }
  .pwrap { flex:1 1 320px; min-width:260px; display:flex; flex-direction:column; gap:5px; }
  .rolebars { display:flex; flex-direction:column; gap:6px; }
  .rbar { display:grid; grid-template-columns:78px 1fr auto; align-items:center; gap:10px; }
  .rname { font:700 11px var(--mono); letter-spacing:.7px; text-transform:uppercase;
           color:var(--accent);
           text-shadow:0 0 8px color-mix(in srgb, var(--accent) 45%, transparent); }
  .rtrack { height:9px; border-radius:6px; overflow:hidden; position:relative;
            background:color-mix(in srgb, var(--accent) 12%, #0a0f1a);
            border:1px solid color-mix(in srgb, var(--accent) 32%, var(--border));
            box-shadow:inset 0 1px 0 rgba(255,255,255,.02); }
  .rfill { position:absolute; inset:0 auto 0 0; height:100%; width:0%;
           background:linear-gradient(90deg,
             color-mix(in srgb, var(--accent) 65%, transparent),
             var(--accent));
           box-shadow:0 0 12px color-mix(in srgb, var(--accent) 55%, transparent);
           transition:width .55s cubic-bezier(.4,0,.2,1); }
  .rcount { font:700 12px var(--mono); color:var(--fg); white-space:nowrap;
            min-width:54px; text-align:right; }
  .rcount em { font-style:normal; color:var(--muted); font-weight:600; margin-left:4px; font-size:11px; }
  .rcount.empty { color:var(--dim); }
  .pmeta { font:600 12px var(--mono); color:var(--muted); margin-top:2px; }
  .pmeta b { color:var(--fg); }
  /* Telemetry tags — replace the soft pill chips with a tighter HUD-style block
     framed by the role accent. Clear at-a-glance role identity. */
  .avitals { display:flex; gap:8px; flex-wrap:wrap; }
  .vchip { display:inline-flex; align-items:center; gap:8px;
           padding:5px 10px 5px 8px; border-radius:6px;
           background:color-mix(in srgb, var(--accent) 7%, var(--panel));
           border:1px solid color-mix(in srgb, var(--accent) 42%, var(--border));
           font:700 11px var(--mono); letter-spacing:.5px;
           color:var(--fg); text-transform:uppercase;
           box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
  .vchip .vdot { width:7px; height:7px; border-radius:50%; background:var(--accent);
                 box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent); }
  .vchip em { font-style:normal; font:700 10px var(--mono); color:color-mix(in srgb,var(--accent) 75%,var(--fg));
              letter-spacing:.7px; }
  .vchip small { font:600 10px var(--mono); color:var(--muted); letter-spacing:.4px; }
  .vchip.idle { border-color:var(--border2);
                background:var(--panel); }
  .vchip.idle .vdot { background:var(--idle); box-shadow:none; }
  .vchip.idle em { color:var(--muted); }
  .vchip.stale, .vchip.no-log { border-color:rgba(255,107,125,.6);
                                 background:color-mix(in srgb, var(--bad) 8%, var(--panel)); }
  .vchip.stale .vdot, .vchip.no-log .vdot { background:var(--bad); box-shadow:0 0 0 3px rgba(255,107,125,.18); }
  .vchip.stale em, .vchip.no-log em { color:var(--bad); }

  /* ---------- grid of agent decks ---------- */
  #grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
          gap:12px; padding:14px 18px 18px; min-height:0; min-width:0; }
  .card { --accent:var(--accent); display:flex; flex-direction:column;
          min-height:0; min-width:0; overflow:hidden;
          background:linear-gradient(180deg,var(--panel),var(--panel2));
          border:1px solid var(--border); border-radius:14px; position:relative;
          box-shadow:0 18px 40px -28px rgba(0,0,0,.9);
          transition:border-color .18s, box-shadow .18s, transform .12s; cursor:pointer; }
  /* entrance is an enhancement only — cards stay visible if motion is reduced/disabled */
  @media (prefers-reduced-motion: no-preference) {
    .card { opacity:0; transform:translateY(10px); animation:rise .5s forwards; }
  }
  @keyframes rise { to { opacity:1; transform:none; } }
  .card::before { content:""; position:absolute; inset:0 0 auto 0; height:2px;
                  background:linear-gradient(90deg,var(--accent),transparent 75%); opacity:.9;
                  transition:height .18s, opacity .18s; z-index:2; }
  /* Corner brackets — ops-console / mission-control signature. CSS-only via
     8 thin lines drawn into the ::after pseudo's background grid. */
  .card::after { content:""; position:absolute; inset:6px; pointer-events:none; z-index:3;
                 background:
                   linear-gradient(var(--accent),var(--accent)) top    left   /14px 1px  no-repeat,
                   linear-gradient(var(--accent),var(--accent)) top    left   /1px  14px no-repeat,
                   linear-gradient(var(--accent),var(--accent)) top    right  /14px 1px  no-repeat,
                   linear-gradient(var(--accent),var(--accent)) top    right  /1px  14px no-repeat,
                   linear-gradient(var(--accent),var(--accent)) bottom left   /14px 1px  no-repeat,
                   linear-gradient(var(--accent),var(--accent)) bottom left   /1px  14px no-repeat,
                   linear-gradient(var(--accent),var(--accent)) bottom right  /14px 1px  no-repeat,
                   linear-gradient(var(--accent),var(--accent)) bottom right  /1px  14px no-repeat;
                 opacity:.32; transition:opacity .2s, inset .2s; }
  .card:hover:not(.selected)::after { opacity:.55; inset:5px; }
  .card.selected::after { opacity:.95; inset:4px;
                          filter:drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent)); }
  .card.live { box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 40%,transparent),
                          0 22px 50px -30px color-mix(in srgb,var(--accent) 60%,#000); }
  /* Hover lift on unselected cards per UX guideline "Hover States" (Medium). */
  .card:hover:not(.selected) { transform:translateY(-2px);
                               border-color:color-mix(in srgb, var(--accent) 50%, var(--border));
                               box-shadow:0 24px 50px -28px color-mix(in srgb, var(--accent) 45%, #000); }
  .card.selected { border-color:var(--accent);
                   box-shadow:0 0 0 2px var(--accent),
                              0 0 32px -6px color-mix(in srgb, var(--accent) 70%, transparent),
                              0 22px 50px -30px color-mix(in srgb, var(--accent) 70%, #000); }
  .card.selected::before { height:4px; opacity:1; }
  .card.attn { border-color:var(--warn);
               box-shadow:0 0 0 2px var(--warn),
                          0 0 28px -4px color-mix(in srgb, var(--warn) 70%, transparent);
               animation:attnPulse 1.5s ease-in-out infinite; }
  @keyframes attnPulse {
    0%,100% { box-shadow:0 0 0 2px var(--warn),
                         0 0 28px -4px color-mix(in srgb, var(--warn) 70%, transparent); }
    50%     { box-shadow:0 0 0 2px var(--warn),
                         0 0 4px -4px color-mix(in srgb, var(--warn) 40%, transparent); }
  }
  .card.selected.attn { border-color:var(--warn); }
  .card h2 { margin:0; padding:10px 13px; display:flex; align-items:center; gap:9px;
             font:700 13px var(--mono); letter-spacing:.3px; border-bottom:1px solid var(--border);
             color:var(--fg); background:rgba(255,255,255,.012); flex:none; }
  .card h2 .tag { color:var(--accent); }
  /* Channel callsign — "CH·01" mono badge. Quick visual lookup per role. */
  .card h2 .callsign { font:700 9px var(--mono); letter-spacing:1.2px; text-transform:uppercase;
                       padding:2px 6px; border-radius:4px;
                       color:var(--accent);
                       background:color-mix(in srgb, var(--accent) 10%, transparent);
                       border:1px solid color-mix(in srgb, var(--accent) 35%, var(--border)); }
  /* Activity meter — 4-bar equalizer mounted centrally in each card header.
     Replaces the old left-edge status dot; conveys both liveness and live
     output activity in one element. */
  .activity { display:flex; align-items:flex-end; gap:2px; height:14px;
              padding:1px 7px;
              border-left:1px dashed color-mix(in srgb, var(--accent) 35%, var(--border2));
              border-right:1px dashed color-mix(in srgb, var(--accent) 35%, var(--border2));
              opacity:.9; }
  .activity .bar { width:3px; height:3px; background:var(--accent); border-radius:1px;
                   opacity:.4; transition:height .25s ease, opacity .25s; }
  .activity.dead { border-color:rgba(255,107,125,.4); }
  .activity.dead .bar { background:var(--bad); height:2px; opacity:.55; animation:none !important; }
  .activity.active .bar { opacity:1;
                          box-shadow:0 0 8px color-mix(in srgb, var(--accent) 55%, transparent); }
  @media (prefers-reduced-motion: no-preference) {
    .activity.active .bar:nth-child(1) { animation:eq1 .65s ease-in-out infinite; }
    .activity.active .bar:nth-child(2) { animation:eq2 .82s ease-in-out infinite; }
    .activity.active .bar:nth-child(3) { animation:eq3 .55s ease-in-out infinite; }
    .activity.active .bar:nth-child(4) { animation:eq4 .75s ease-in-out infinite; }
  }
  @keyframes eq1 { 0%,100% { height:3px; } 50% { height:11px; } }
  @keyframes eq2 { 0%,100% { height:5px; } 50% { height:13px; } }
  @keyframes eq3 { 0%,100% { height:2px; } 50% { height:9px;  } }
  @keyframes eq4 { 0%,100% { height:6px; } 50% { height:12px; } }
  .actpad { flex:1; min-width:0; }
  .card h2 .selbadge { font:700 9px var(--mono); letter-spacing:.6px; padding:2px 6px;
                       border-radius:5px; color:#06121f; background:var(--accent);
                       opacity:0; transition:opacity .18s; }
  .card.selected h2 .selbadge { opacity:1; }
  .card h2 .attnbadge { font:700 9px var(--mono); letter-spacing:.6px; padding:2px 6px;
                        border-radius:5px; color:#1a1300; background:var(--warn);
                        display:none; animation:badgeBlink 1s steps(2) infinite; }
  .card.attn h2 .attnbadge { display:inline-block; }
  @keyframes badgeBlink { 50% { opacity:.45; } }
  .spacer { flex:1; }
  .icon-btn { font:600 11px var(--mono); color:var(--muted); background:transparent; cursor:pointer;
              border:1px solid var(--border2); border-radius:7px; padding:5px 9px; transition:.15s; }
  .icon-btn:hover { color:var(--fg); border-color:var(--accent); }

  .term { flex:1; min-height:0; min-width:0; padding:4px 6px; overflow:hidden;
          background:#0a0f1a; position:relative; }
  .term .xterm, .term .xterm-viewport, .term .xterm-screen { width:100% !important; }
  /* Subtle CRT scanline overlay — UI Pro Max Cyberpunk/HUD aesthetic, kept
     very low opacity so terminal text stays the dominant element. */
  .term::after { content:""; position:absolute; inset:0; pointer-events:none;
                 background:repeating-linear-gradient(180deg,
                   rgba(255,255,255,.022) 0 1px,
                   transparent 1px 3px);
                 mix-blend-mode:screen; z-index:1; opacity:.85; }
  @media (prefers-reduced-motion: reduce) {
    .term::after { display:none; }
  }
  .foot { border-top:1px solid var(--border); padding:8px; display:flex; flex-direction:column; gap:7px; }
  .msgrow { display:flex; gap:7px; }
  .msg { flex:1; min-width:0; background:#070b13; color:var(--fg); border:1px solid var(--border2);
         border-radius:8px; padding:8px 10px; font:13px var(--ui); transition:border-color .15s; }
  .msg:focus { outline:none; border-color:var(--accent); }
  .keys { display:flex; gap:5px; flex-wrap:wrap; }
  .keys .icon-btn { padding:5px 8px; }
  .keys .icon-btn.send { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 45%,var(--border2)); }

  /* Bumped from --dim → --muted per UX guideline "Contrast Readability" (High). */
  .legend { font:600 11px var(--mono); color:var(--muted); padding:0 18px 10px; }
  .legend b { color:var(--fg); }

  @media (max-width:920px){
    #grid { grid-template-columns:1fr; grid-template-rows:repeat(4,minmax(260px,1fr)); }
    .vitals { gap:12px; }
  }
</style>
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <div class="row1"><span class="b1">TEAM</span><span class="b2">//</span><span class="b1">CONSOLE</span><span class="caret"></span></div>
      <div class="sub" id="brandSub">· LOCAL · <span class="ok">4CH</span> · STANDBY ·</div>
    </div>
    <textarea id="goal" placeholder="Goal for the LEAD — paste what the team should build or fix…"></textarea>
    <button class="btn primary" id="kickoff" title="Send each agent its role prompt (Lead first), with the Goal injected">▶ Kickoff all</button>
    <button class="btn" id="statusAll" title="Send 'state' to every agent">↻ state → all</button>
    <span class="conn"><span id="conn" class="pulse"></span><span id="connTxt">connecting…</span></span>
  </header>

  <section class="vitals">
    <div class="pwrap">
      <div class="rolebars" id="rolebars"></div>
      <div class="pmeta" id="pmeta">board — waiting for .team/board.md…</div>
    </div>
    <div class="avitals" id="avitals"></div>
  </section>

  <main id="grid"></main>
  <div class="legend">
    <b>tip:</b> click any panel to select it · the top bar shows per-role progress (lead · backend · frontend · quality) · cards pulse <b>yellow</b> when an agent looks like it's waiting for input
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const ACCENTS = { lead:"#f5b94a", backend:"#36d6c3", frontend:"#f06bd2", quality:"#7ee787" };
    const accentFor = (id) => {
      if (ACCENTS[id]) return ACCENTS[id];
      let h = 0; for (const ch of id) h = (h * 31 + ch.charCodeAt(0)) % 360;
      return `hsl(${h} 72% 62%)`;
    };
    const human = (s) => s < 0 ? "—" : s < 60 ? s + "s" : s < 3600 ? Math.round(s/60) + "m" : Math.round(s/3600) + "h";

    const terms = {};
    let ws, cfg, selectedId = null;

    // Heuristic: terminal output that suggests the agent is waiting for user input.
    const ATTN_RE = /\(y\/n\)|\[y\/n\]|\(yes\/no\)|\[yes\/no\]|press enter to continue|press any key|❯ \w|⟶ \w|do you want to|are you sure|\? [^\n]{0,80}(\(|:)|continue\?|confirm\?/i;

    const send = (o) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); };
    const input = (id, d) => { clearAttention(id); send({ t: "i", id, d }); };
    const paste = (id, text) => input(id, "\x1b[200~" + text + "\x1b[201~"); // bracketed paste
    const flatten = (s) => (s || "").replace(/\s*\n\s*/g, " ").trim();

    function selectCard(id) {
      if (selectedId === id) return;
      selectedId = id;
      document.querySelectorAll(".card").forEach((c) => c.classList.toggle("selected", c.id === "card-" + id));
      const t = terms[id]; if (t && t.term) { try { t.term.focus(); } catch {} }
    }
    function setAttention(id, on) {
      const card = document.getElementById("card-" + id); if (!card) return;
      card.classList.toggle("attn", !!on);
    }
    const clearAttention = (id) => setAttention(id, false);

    function sendPrompt(id, goalOverride) {
      const a = cfg.agents.find((x) => x.id === id); if (!a) return;
      const goal = (goalOverride !== undefined ? goalOverride : document.getElementById("goal").value)
                   || "<<< describe the goal >>>";
      paste(id, flatten((a.prompt || "").replace("{{GOAL}}", goal)));
      input(id, "\r");
    }
    function sendMsg(id) {
      const m = document.getElementById("msg-" + id); if (!m.value) return;
      paste(id, m.value); input(id, "\r"); m.value = "";
    }

    async function boot() {
      cfg = await (await fetch("/agents")).json();
      const grid = document.getElementById("grid");
      cfg.agents.forEach((a, i) => {
        const accent = accentFor(a.id);
        const card = document.createElement("div");
        card.className = "card"; card.id = "card-" + a.id;
        card.style.setProperty("--accent", accent);
        card.style.animationDelay = (i * 80) + "ms";
        const channel = "CH·" + String(i + 1).padStart(2, "0");
        card.innerHTML = `
          <h2>${a.label}
            <span class="callsign" title="channel ${i+1} of ${cfg.agents.length}">${channel}</span>
            <span class="tag">#${a.id}</span>
            <span class="attnbadge" title="agent appears to be waiting for input">⚠ needs input</span>
            <span class="selbadge">selected</span>
            <span class="actpad"></span>
            <span class="activity" id="act-${a.id}" title="agent activity">
              <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </span>
            <span class="actpad"></span>
            <button class="icon-btn" data-act="start" data-id="${a.id}" title="restart this agent">⟳ restart</button>
          </h2>
          <div class="term" id="term-${a.id}"></div>
          <div class="foot">
            <div class="msgrow">
              <input class="msg" id="msg-${a.id}" placeholder="message ${a.label} — Enter sends" />
              <button class="icon-btn send" data-act="sendmsg" data-id="${a.id}">Send ➤</button>
            </div>
            <div class="keys">
              <button class="icon-btn send" data-act="prompt" data-id="${a.id}" title="send this agent its role prompt">⮞ prompt</button>
              <button class="icon-btn" data-act="enter"  data-id="${a.id}">⏎ Enter</button>
              <button class="icon-btn" data-act="state" data-id="${a.id}">state</button>
              <button class="icon-btn" data-act="y"      data-id="${a.id}">y</button>
              <button class="icon-btn" data-act="esc"    data-id="${a.id}">Esc</button>
              <button class="icon-btn" data-act="sigint" data-id="${a.id}">^C</button>
            </div>
          </div>`;
        grid.appendChild(card);

        // one agent's terminal failing must never abort the rest of the console
        try {
          const term = new Terminal({ fontSize: 12, fontFamily: '"JetBrains Mono",ui-monospace,monospace',
            cursorBlink: true, theme: { background: "#0a0f1a", foreground: "#e8ecf5", cursor: accent } });
          const fit = new FitAddon.FitAddon();
          term.loadAddon(fit); term.open(document.getElementById("term-" + a.id));
          try { fit.fit(); } catch {}
          term.onData((d) => input(a.id, d));
          terms[a.id] = { term, fit };
        } catch (err) {
          const el = document.getElementById("term-" + a.id);
          if (el) el.innerHTML = '<div style="padding:14px;color:var(--muted);font:12px var(--mono)">terminal unavailable — ' + (err && err.message || err) + '</div>';
        }

        const mbox = document.getElementById("msg-" + a.id);
        if (mbox) mbox.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); sendMsg(a.id); }
        });
      });

      const doFit = () => {
        for (const id in terms) {
          try { terms[id].fit.fit(); } catch {}
          const t = terms[id].term; send({ t: "resize", id, cols: t.cols, rows: t.rows });
        }
      };
      window.addEventListener("resize", () => { clearTimeout(window._rt); window._rt = setTimeout(doFit, 150); });
      setTimeout(doFit, 350);

      // Click anywhere on a card → mark it as selected.
      grid.addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (card && card.id.startsWith("card-")) selectCard(card.id.slice("card-".length));
        const b = e.target.closest("button"); if (!b) return;
        const { id, act } = b.dataset;
        if (act === "enter") input(id, "\r");
        else if (act === "state") input(id, "state\r");
        else if (act === "y") input(id, "y\r");
        else if (act === "esc") input(id, "\x1b");
        else if (act === "sigint") input(id, "\x03");
        else if (act === "start") send({ t: "start", id });
        else if (act === "prompt") sendPrompt(id);
        else if (act === "sendmsg") sendMsg(id);
      });

      document.getElementById("kickoff").addEventListener("click", (e) => {
        // Snapshot the goal once so every agent gets the same text, then clear the
        // textarea immediately so the user sees the dispatch was accepted.
        const goalEl = document.getElementById("goal");
        const goal = goalEl.value;
        cfg.agents.forEach((a, i) => setTimeout(() => sendPrompt(a.id, goal), i * 700));
        goalEl.value = "";
        // Brief CTA flash — UX guideline "Submit Feedback": confirm the action
        // visibly so the user knows the click registered.
        const btn = e.currentTarget;
        btn.classList.remove("flash"); void btn.offsetWidth;
        btn.classList.add("flash");
      });
      document.getElementById("statusAll").addEventListener("click", () => {
        for (const a of cfg.agents) input(a.id, "state\r");
      });

      // Auto-select the first agent so users can immediately see the selected style.
      if (cfg.agents.length) selectCard(cfg.agents[0].id);

      connect();
      pollStatus(); setInterval(pollStatus, 3000);
    }

    function renderVitals(s) {
      const c = s.counts || {}, total = c.total || 0;
      const tasks = s.tasks || [];
      const roleOrder = (cfg && cfg.agents ? cfg.agents.map((a) => a.id) : ["lead","backend","frontend","quality"]);

      // per-role done/total derived from board tasks
      const per = {};
      for (const id of roleOrder) per[id] = { done: 0, total: 0 };
      for (const t of tasks) {
        if (!per[t.owner]) per[t.owner] = { done: 0, total: 0 };
        per[t.owner].total++;
        if (t.state === "done") per[t.owner].done++;
      }

      const rolebars = document.getElementById("rolebars");
      rolebars.innerHTML = roleOrder.map((id) => {
        const p = per[id], pct = p.total ? Math.round(100 * p.done / p.total) : 0;
        const accent = accentFor(id);
        const empty = p.total ? "" : " empty";
        const countLabel = p.total
          ? `${p.done}<em>/ ${p.total}</em>`
          : `<em>idle</em>`;
        return `<div class="rbar" style="--accent:${accent}" data-role="${id}" title="${id}: ${p.done}/${p.total} done (${pct}%)">
                  <span class="rname">${id}</span>
                  <div class="rtrack"><div class="rfill" style="width:${pct}%"></div></div>
                  <span class="rcount${empty}">${countLabel}</span>
                </div>`;
      }).join("");

      document.getElementById("pmeta").innerHTML = total
        ? `<b>${c.done || 0}/${total}</b> done · ${c.doing || 0} doing · ${c.blocked || 0} blocked · ${c.todo || 0} todo`
        : "board — no tasks yet";
      document.getElementById("avitals").innerHTML = (s.roles || []).map((r) =>
        `<span class="vchip ${r.state}" style="--accent:${accentFor(r.id)}">
           <span class="vdot"></span>${r.id}<em>${r.state}</em><small>${human(r.ageSec)}</small></span>`).join("");
    }
    async function pollStatus() {
      try { renderVitals(await (await fetch("/state")).json()); } catch { /* offline */ }
    }

    function connect() {
      ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host);
      const dot = document.getElementById("conn"), txt = document.getElementById("connTxt");
      ws.onopen = () => { dot.className = "pulse on"; txt.textContent = "connected"; renderBrandSub(); };
      ws.onclose = () => { dot.className = "pulse off"; txt.textContent = "reconnecting…"; renderBrandSub(); setTimeout(connect, 1500); };
      ws.onmessage = (ev) => {
        const m = JSON.parse(ev.data);
        if (m.t === "o" && terms[m.id]) {
          terms[m.id].term.write(m.d);
          flashActivity(m.id);
          // Heuristic: when an agent writes a confirmation/input prompt, highlight the card.
          // Only flag the *non-selected* cards so the focused one doesn't pulse at you.
          if (ATTN_RE.test(m.d) && m.id !== selectedId) setAttention(m.id, true);
        }
        else if (m.t === "started") { setLive(m.id, true); setAttention(m.id, false); }
        else if (m.t === "exit") {
          setLive(m.id, false); setAttention(m.id, false);
          if (terms[m.id]) terms[m.id].term.write("\r\n\x1b[31m[process exited]\x1b[0m\r\n");
        }
      };
    }
    function setLive(id, on) {
      const card = document.getElementById("card-" + id); if (card) card.classList.toggle("live", on);
      const act = document.getElementById("act-" + id);
      if (act) act.classList.toggle("dead", !on);
      if (!on && act) act.classList.remove("active");
      renderBrandSub();
    }
    // Equalizer bars animate while data is flowing, calm down ~700ms after silence.
    const _actTimers = {};
    function flashActivity(id) {
      const act = document.getElementById("act-" + id); if (!act || act.classList.contains("dead")) return;
      act.classList.add("active");
      clearTimeout(_actTimers[id]);
      _actTimers[id] = setTimeout(() => act.classList.remove("active"), 700);
    }
    function renderBrandSub() {
      const sub = document.getElementById("brandSub"); if (!sub || !cfg) return;
      const total = cfg.agents.length;
      const live = document.querySelectorAll(".card.live").length;
      const connected = ws && ws.readyState === 1;
      const status = !connected ? '<span style="color:var(--bad)">OFFLINE</span>'
                   : live === total ? '<span class="ok">ONLINE</span>'
                   : live === 0     ? 'STANDBY'
                   :                   '<span class="ok">PARTIAL</span>';
      sub.innerHTML = `· LOCAL · <span class="ok">${live}/${total} CH</span> · ${status} ·`;
    }

    boot();
  </script>
</body>
</html>
