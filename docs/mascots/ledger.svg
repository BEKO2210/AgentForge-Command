<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="LEDGER · Accountant Raccoon mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#eab308" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#eab308" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#eab308">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="22" y="18" width="3" height="3" fill="#94a3b8" class="r-tail"/><rect x="24" y="20" width="4" height="3" fill="#1e293b" class="r-tail"/><rect x="26" y="22" width="4" height="3" fill="#94a3b8" class="r-tail"/><rect x="28" y="24" width="3" height="2" fill="#1e293b" class="r-tail"/><rect x="7" y="14" width="16" height="12" fill="#94a3b8" class="r-body"/><rect x="8" y="13" width="14" height="1" fill="#94a3b8" class="r-body"/><rect x="10" y="18" width="10" height="7" fill="#cbd5e1" class="r-chest"/><rect x="9" y="26" width="3" height="2" fill="#475569" class="r-leg"/><rect x="18" y="26" width="3" height="2" fill="#475569" class="r-leg"/><rect x="6" y="7" width="14" height="8" fill="#94a3b8" class="r-head"/><rect x="7" y="6" width="12" height="1" fill="#94a3b8" class="r-head"/><rect x="6" y="4" width="3" height="3" fill="#94a3b8" class="r-ear"/><rect x="17" y="4" width="3" height="3" fill="#94a3b8" class="r-ear"/><rect x="7" y="5" width="1" height="1" fill="#1e293b" class="r-ear-in"/><rect x="18" y="5" width="1" height="1" fill="#1e293b" class="r-ear-in"/><rect x="6" y="9" width="14" height="3" fill="#1e293b" class="r-mask"/><rect x="8" y="10" width="2" height="2" fill="#fff" class="r-eye"/><rect x="16" y="10" width="2" height="2" fill="#fff" class="r-eye"/><rect x="9" y="11" width="1" height="1" fill="#000" class="r-eye-pupil"/><rect x="17" y="11" width="1" height="1" fill="#000" class="r-eye-pupil"/><rect x="12" y="13" width="2" height="1" fill="#1e293b" class="r-nose"/><rect x="5" y="18" width="2" height="2" fill="#475569" class="r-hand"/><rect x="21" y="18" width="2" height="2" fill="#475569" class="r-hand"/></g>
      <g class="mascot-evo"><rect x="22" y="16" width="3" height="3" fill="#fcd34d" class="r-coin"/><rect x="23" y="17" width="1" height="1" fill="#a16207" class="r-coin"/><rect x="26" y="6" width="2" height="2" fill="currentColor" class="r-coin2"/><rect x="2" y="30" width="24" height="1" fill="#1e293b" class="r-bar-bg"/><rect x="2" y="30" width="14" height="1" fill="#fcd34d" class="r-bar-fill"/><rect x="25" y="10" width="1" height="1" fill="currentColor" class="r-tick"/><rect x="27" y="12" width="1" height="1" fill="currentColor" class="r-tick"/><rect x="29" y="10" width="1" height="1" fill="currentColor" class="r-tick"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#eab308"
        opacity=".75" letter-spacing="1.2">
    LEDGER · ACCOUNTANT RACCOON
  </text>
</svg>
