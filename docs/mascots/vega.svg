0" y="19" width="9" height="2" fill="#6ee7b7" class="r-wing-b"/><rect x="13" y="21" width="4" height="1" fill="#6ee7b7" class="r-wing-b" opacity="0.85"/><rect x="6" y="13" width="4" height="1" fill="#10b981" class="r-tail"/><rect x="6" y="16" width="4" height="1" fill="#10b981" class="r-tail"/><rect x="6" y="15" width="1" height="1" fill="#064e3b" class="r-tail"/></g>
      <g class="mascot-evo"><rect x="1" y="13" width="1" height="1" fill="currentColor" class="r-trail2" opacity="0.7"/><rect x="14" y="16" width="1" height="1" fill="currentColor" class="r-shimmer"/><rect x="30" y="11" width="1" height="1" fill="currentColor" class="r-beak-tip"/><rect x="4" y="5" width="26" height="22" fill="currentColor" class="r-orbit" opacity="0.1"/></g>
    
