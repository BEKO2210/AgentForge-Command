" class="r-beak-hi"/><rect x="21" y="9" width="3" height="3" fill="#fcd34d" class="r-eye-w"/><rect x="22" y="10" width="1" height="1" fill="#0f172a" class="r-eye"/><rect x="23" y="9" width="1" height="1" fill="#fff" class="r-eye-glint"/><rect x="12" y="25" width="2" height="2" fill="#fcd34d" class="r-leg"/><rect x="18" y="25" width="2" height="2" fill="#fcd34d" class="r-leg"/></g>
