<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="SENTINEL · Guardian Owl mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#7ee787" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#7ee787" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#7ee787">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="7" y="11" width="18" height="14" fill="#5e3f2d" class="r-body"/><rect x="8" y="10" width="16" height="1" fill="#5e3f2d" class="r-body"/><rect x="10" y="16" width="12" height="9" fill="#a07655" class="r-chest"/><rect x="6" y="6" width="20" height="8" fill="#5e3f2d" class="r-head"/><rect x="7" y="5" width="18" height="1" fill="#5e3f2d" class="r-head"/><rect x="9" y="4" width="14" height="1" fill="#5e3f2d" class="r-head"/><rect x="6" y="3" width="2" height="2" fill="#5e3f2d" class="r-tuft"/><rect x="24" y="3" width="2" height="2" fill="#5e3f2d" class="r-tuft"/><rect x="8" y="7" width="16" height="7" fill="#c7a37f" class="r-face"/><rect x="9" y="8" width="5" height="5" fill="#fcd34d" class="r-eye-bg"/><rect x="18" y="8" width="5" height="5" fill="#fcd34d" class="r-eye-bg"/><rect x="10" y="9" width="3" height="3" fill="#000" class="r-eye-pupil"/><rect x="19" y="9" width="3" height="3" fill="#000" class="r-eye-pupil"/><rect x="11" y="9" width="1" height="1" fill="#fff" class="r-eye-glint"/><rect x="20" y="9" width="1" height="1" fill="#fff" class="r-eye-glint"/><rect x="15" y="13" width="2" height="2" fill="#f59e0b" class="r-beak"/><rect x="16" y="15" width="1" height="1" fill="#f59e0b" class="r-beak"/><rect x="9" y="25" width="14" height="1" fill="#f59e0b" class="r-talon"/><rect x="10" y="26" width="2" height="1" fill="#f59e0b" class="r-talon"/><rect x="15" y="26" width="2" height="1" fill="#f59e0b" class="r-talon"/><rect x="20" y="26" width="2" height="1" fill="#f59e0b" class="r-talon"/></g>
      <g class="mascot-evo"><rect x="6" y="14" width="20" height="1" fill="currentColor" class="r-scan" opacity="0.7"/><rect x="12" y="18" width="2" height="1" fill="#5e3f2d" class="r-feather"/><rect x="16" y="18" width="2" height="1" fill="#5e3f2d" class="r-feather"/><rect x="14" y="20" width="2" height="1" fill="#5e3f2d" class="r-feather"/><rect x="5" y="14" width="2" height="7" fill="#3a261a" class="r-wing"/><rect x="25" y="14" width="2" height="7" fill="#3a261a" class="r-wing"/><rect x="4" y="5" width="24" height="22" fill="currentColor" class="r-aura" opacity="0.12"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#7ee787"
