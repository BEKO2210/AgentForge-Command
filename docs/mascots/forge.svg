<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="FORGE · Forge Mole mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a55" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#ff9a55" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#ff9a55" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#ff9a55" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#ff9a55">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="5" y="12" width="22" height="14" fill="#5a4030" class="r-body"/><rect x="6" y="11" width="20" height="1" fill="#5a4030" class="r-body"/><rect x="4" y="14" width="1" height="10" fill="#5a4030" class="r-body"/><rect x="27" y="14" width="1" height="10" fill="#5a4030" class="r-body"/><rect x="7" y="18" width="18" height="6" fill="#7a5a44" class="r-belly"/><rect x="2" y="15" width="4" height="4" fill="#fb7185" class="r-snout"/><rect x="1" y="16" width="1" height="2" fill="#fb7185" class="r-snout"/><rect x="2" y="17" width="1" height="1" fill="#7f1d1d" class="r-nostril"/><rect x="4" y="17" width="1" height="1" fill="#7f1d1d" class="r-nostril"/><rect x="7" y="15" width="2" height="1" fill="#111" class="r-eye"/><rect x="8" y="14" width="1" height="1" fill="#111" class="r-eye"/><rect x="0" y="14" width="1" height="1" fill="#a78bfa" class="r-whisker" opacity="0.7"/><rect x="0" y="19" width="1" height="1" fill="#a78bfa" class="r-whisker" opacity="0.7"/><rect x="24" y="19" width="6" height="3" fill="#cbd5e1" class="r-claw"/><rect x="25" y="22" width="5" height="1" fill="#cbd5e1" class="r-claw"/><rect x="26" y="23" width="4" height="1" fill="#94a3b8" class="r-claw"/><rect x="29" y="19" width="1" height="1" fill="#fff" class="r-claw-tip"/><rect x="29" y="21" width="1" height="1" fill="#fff" class="r-claw-tip"/><rect x="6" y="26" width="3" height="1" fill="#3d2a20" class="r-foot"/><rect x="22" y="26" width="3" height="1" fill="#3d2a20" class="r-foot"/></g>
      <g class="mascot-evo"><rect x="26" y="16" width="1" height="1" fill="currentColor" class="r-spark"/><rect x="28" y="14" width="1" height="1" fill="currentColor" class="r-spark"/><rect x="24" y="14" width="1" height="1" fill="currentColor" class="r-spark"/><rect x="10" y="10" width="1" height="1" fill="#3d2a20" class="r-fur"/><rect x="14" y="10" width="1" height="1" fill="#3d2a20" class="r-fur"/><rect x="12" y="26" width="8" height="1" fill="#475569" class="r-anvil"/><rect x="14" y="24" width="4" height="2" fill="#64748b" class="r-anvil-top"/><rect x="22" y="5" width="4" height="3" fill="#94a3b8" class="r-hammer-head"/><rect x="23" y="8" width="1" height="4" fill="#5a4030" class="r-hammer-shaft"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#ff9a55"
