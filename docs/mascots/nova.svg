<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="NOVA · Tiny Star Dragon mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#60a5fa" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#60a5fa" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#60a5fa">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="22" y="18" width="4" height="2" fill="#7c3aed" class="r-tail"/><rect x="25" y="20" width="2" height="4" fill="#7c3aed" class="r-tail"/><rect x="23" y="24" width="3" height="2" fill="#7c3aed" class="r-tail"/><rect x="6" y="14" width="18" height="8" fill="#7c3aed" class="r-body"/><rect x="7" y="13" width="16" height="1" fill="#7c3aed" class="r-body"/><rect x="8" y="18" width="14" height="4" fill="#a78bfa" class="r-belly"/><rect x="9" y="22" width="2" height="3" fill="#5b21b6" class="r-leg"/><rect x="14" y="22" width="2" height="3" fill="#5b21b6" class="r-leg"/><rect x="19" y="22" width="2" height="3" fill="#5b21b6" class="r-leg"/><rect x="12" y="8" width="8" height="5" fill="#5b21b6" class="r-wing"/><rect x="14" y="7" width="4" height="1" fill="#5b21b6" class="r-wing"/><rect x="14" y="13" width="6" height="1" fill="#5b21b6" class="r-wing"/><rect x="13" y="11" width="1" height="2" fill="#a78bfa" class="r-wing-membrane"/><rect x="16" y="11" width="1" height="2" fill="#a78bfa" class="r-wing-membrane"/><rect x="19" y="11" width="1" height="2" fill="#a78bfa" class="r-wing-membrane"/><rect x="10" y="12" width="1" height="2" fill="#fcd34d" class="r-spike"/><rect x="13" y="12" width="1" height="2" fill="#fcd34d" class="r-spike"/><rect x="17" y="12" width="1" height="2" fill="#fcd34d" class="r-spike"/><rect x="2" y="13" width="6" height="5" fill="#7c3aed" class="r-head"/><rect x="3" y="11" width="1" height="2" fill="#fcd34d" class="r-horn"/><rect x="5" y="11" width="1" height="2" fill="#fcd34d" class="r-horn"/><rect x="3" y="15" width="1" height="1" fill="#fcd34d" class="r-eye"/><rect x="0" y="16" width="2" height="1" fill="currentColor" class="r-breath" opacity="0.6"/></g>
      <g class="mascot-evo"><rect x="26" y="4" width="2" height="2" fill="#fcd34d" class="r-star"/><rect x="22" y="2" width="2" height="2" fill="#fcd34d" class="r-star"/><rect x="29" y="8" width="1" height="1" fill="#fcd34d" class="r-star"/><rect x="0" y="15" width="1" height="1" fill="#f97316" class="r-fire"/><rect x="0" y="17" width="1" height="1" fill="#fb923c" class="r-fire"/><rect x="0" y="6" width="32" height="22" fill="currentColor" class="r-orbit" opacity="0.08"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#60a5fa"
        opacity=".75" letter-spacing="1.2">
    NOVA · TINY STAR DRAGON
  </text>
</svg>
