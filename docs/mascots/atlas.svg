<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="ATLAS PRIME · Cyber Turtle mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b94a" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#f5b94a" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#f5b94a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#f5b94a" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#f5b94a">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="6" y="25" width="20" height="1" fill="#000" class="r-shadow" opacity="0.35"/><rect x="6" y="21" width="3" height="4" fill="#3f6c45" class="r-leg"/><rect x="23" y="21" width="3" height="4" fill="#3f6c45" class="r-leg"/><rect x="9" y="22" width="3" height="3" fill="#3f6c45" class="r-leg"/><rect x="20" y="22" width="3" height="3" fill="#3f6c45" class="r-leg"/><rect x="5" y="14" width="22" height="8" fill="#2a4530" class="r-shell-base"/><rect x="6" y="11" width="20" height="10" fill="#4a8a55" class="r-shell"/><rect x="7" y="10" width="18" height="1" fill="#4a8a55" class="r-shell"/><rect x="8" y="9" width="16" height="1" fill="#4a8a55" class="r-shell"/><rect x="8" y="11" width="5" height="1" fill="#7bbd8a" class="r-shell-light"/><rect x="7" y="12" width="3" height="1" fill="#7bbd8a" class="r-shell-light"/><rect x="11" y="13" width="3" height="3" fill="#3f6c45" class="r-shell-pattern"/><rect x="16" y="13" width="3" height="3" fill="#3f6c45" class="r-shell-pattern"/><rect x="13" y="17" width="3" height="3" fill="#3f6c45" class="r-shell-pattern"/><rect x="18" y="16" width="3" height="2" fill="#3f6c45" class="r-shell-pattern"/><rect x="26" y="17" width="2" height="2" fill="#5fa86d" class="r-tail"/><rect x="28" y="18" width="1" height="1" fill="#5fa86d" class="r-tail"/><rect x="3" y="16" width="3" height="3" fill="#5fa86d" class="r-neck"/><rect x="1" y="14" width="5" height="5" fill="#5fa86d" class="r-head"/><rect x="2" y="16" width="1" height="1" fill="#000" class="r-eye"/><rect x="4" y="16" width="1" height="1" fill="#000" class="r-eye"/></g>
      <g class="mascot-evo"><rect x="15" y="9" width="2" height="2" fill="currentColor" class="r-radar"/><rect x="10" y="14" width="1" height="1" fill="currentColor" class="r-shell-led"/><rect x="20" y="14" width="1" height="1" fill="currentColor" class="r-shell-led"/><rect x="8" y="8" width="16" height="1" fill="currentColor" class="r-bridge" opacity="0.7"/><rect x="15" y="3" width="2" height="6" fill="currentColor" class="r-antenna"/><rect x="14" y="1" width="4" height="2" fill="currentColor" class="r-antenna-tip"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#f5b94a"
        opacity=".75" letter-spacing="1.2">
    ATLAS PRIME · CYBER TURTLE
  </text>
</svg>
