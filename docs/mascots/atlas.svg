          <stop offset="0%"  stop-color="currentColor" stop-opacity="0.27499999999999997"/>
          <stop offset="60%" stop-color="currentColor" stop-opacity="0.02"/>
          <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
        </radialGradient>
        <filter id="glow-turtle-5" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle class="mascot-halo" cx="50" cy="52" r="46" fill="url(#halo-turtle-5)"/>
