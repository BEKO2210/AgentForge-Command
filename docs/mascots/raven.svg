<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="RAVEN · Debug Raven mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b7d" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#ff6b7d" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#ff6b7d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#ff6b7d" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#ff6b7d">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="8" y="11" width="14" height="1" fill="#000" class="r-body-outline"/><rect x="8" y="25" width="14" height="1" fill="#000" class="r-body-outline"/><rect x="7" y="12" width="1" height="13" fill="#000" class="r-body-outline"/><rect x="22" y="12" width="1" height="13" fill="#000" class="r-body-outline"/><rect x="8" y="12" width="14" height="13" fill="#0a0a0a" class="r-body"/><rect x="8" y="12" width="4" height="1" fill="#1f2937" class="r-body-hi"/><rect x="9" y="13" width="6" height="10" fill="#000" class="r-wing"/><rect x="17" y="6" width="8" height="1" fill="#000" class="r-head-outline"/><rect x="17" y="14" width="8" height="1" fill="#000" class="r-head-outline"/><rect x="16" y="7" width="1" height="7" fill="#000" class="r-head-outline"/><rect x="25" y="7" width="1" height="7" fill="#000" class="r-head-outline"/><rect x="17" y="7" width="8" height="7" fill="#0a0a0a" class="r-head"/><rect x="25" y="9" width="6" height="1" fill="#450a0a" class="r-beak-outline"/><rect x="25" y="13" width="6" height="1" fill="#450a0a" class="r-beak-outline"/><rect x="25" y="10" width="6" height="1" fill="#7f1d1d" class="r-beak"/><rect x="25" y="11" width="5" height="1" fill="#7f1d1d" class="r-beak"/><rect x="25" y="12" width="4" height="1" fill="#7f1d1d" class="r-beak"/><rect x="21" y="9" width="4" height="4" fill="#ef4444" class="r-eye-glow" opacity="0.3"/><rect x="22" y="10" width="2" height="2" fill="#ef4444" class="r-eye-w"/><rect x="22" y="10" width="1" height="1" fill="#fca5a5" class="r-eye"/><rect x="12" y="25" width="2" height="3" fill="#7f1d1d" class="r-leg"/><rect x="18" y="25" width="2" height="3" fill="#7f1d1d" class="r-leg"/></g>
      <g class="mascot-evo"><rect x="5" y="16" width="4" height="1" fill="#ef4444" class="r-glitch" opacity="0.7"/><rect x="24" y="22" width="5" height="1" fill="#ef4444" class="r-glitch" opacity="0.7"/><rect x="1" y="9" width="6" height="1" fill="#ef4444" class="r-glitch" opacity="0.5"/><rect x="22" y="16" width="8" height="1" fill="#ef4444" class="r-glitch" opacity="0.5"/><rect x="4" y="30" width="2" height="1" fill="currentColor" class="r-trace"/><rect x="8" y="30" width="2" height="1" fill="currentColor" class="r-trace"/><rect x="12" y="30" width="2" height="1" fill="currentColor" class="r-trace"/><rect x="16" y="30" width="2" height="1" fill="currentColor" class="r-trace"/><rect x="0" y="0" width="8" height="5" fill="#7f1d1d" class="r-stack" opacity="0.5"/><rect x="1" y="2" width="6" height="1" fill="currentColor" class="r-stack-text"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#ff6b7d"
