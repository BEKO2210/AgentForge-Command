<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="AURORA · Neon Fox mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f06bd2" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#f06bd2" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#f06bd2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#f06bd2" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#f06bd2">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="10" y="24" width="2" height="4" fill="#c2410c" class="r-leg"/><rect x="16" y="24" width="2" height="4" fill="#c2410c" class="r-leg"/><rect x="20" y="24" width="2" height="4" fill="#c2410c" class="r-leg"/><rect x="22" y="14" width="3" height="2" fill="#e85a1c" class="r-tail"/><rect x="24" y="15" width="3" height="3" fill="#e85a1c" class="r-tail"/><rect x="26" y="17" width="3" height="4" fill="#e85a1c" class="r-tail"/><rect x="27" y="20" width="3" height="3" fill="#fff" class="r-tail-tip"/><rect x="8" y="16" width="16" height="9" fill="#e85a1c" class="r-body"/><rect x="9" y="15" width="14" height="1" fill="#e85a1c" class="r-body"/><rect x="10" y="21" width="12" height="3" fill="#fff" class="r-belly"/><rect x="6" y="10" width="8" height="7" fill="#e85a1c" class="r-head"/><rect x="7" y="9" width="6" height="1" fill="#e85a1c" class="r-head"/><rect x="4" y="13" width="2" height="3" fill="#e85a1c" class="r-head"/><rect x="5" y="6" width="3" height="4" fill="#e85a1c" class="r-ear"/><rect x="12" y="6" width="3" height="4" fill="#e85a1c" class="r-ear"/><rect x="6" y="8" width="1" height="2" fill="#fda4af" class="r-ear-in"/><rect x="13" y="8" width="1" height="2" fill="#fda4af" class="r-ear-in"/><rect x="3" y="14" width="4" height="2" fill="#fff" class="r-muzzle"/><rect x="2" y="14" width="2" height="2" fill="#111" class="r-nose"/><rect x="8" y="12" width="1" height="1" fill="#111" class="r-eye"/><rect x="12" y="12" width="1" height="1" fill="#111" class="r-eye"/></g>
      <g class="mascot-evo"><rect x="22" y="13" width="8" height="1" fill="currentColor" class="r-tail-glow" opacity="0.7"/><rect x="17" y="12" width="1" height="1" fill="currentColor" class="r-shimmer"/><rect x="19" y="14" width="1" height="1" fill="currentColor" class="r-shimmer"/><rect x="12" y="16" width="10" height="1" fill="#9a2f0a" class="r-stripe"/><rect x="1" y="8" width="30" height="18" fill="currentColor" class="r-aura" opacity="0.1"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-weight="700" font-size="9" fill="#f06bd2"
        opacity=".75" letter-spacing="1.2">
    AURORA · NEON FOX
  </text>
</svg>
