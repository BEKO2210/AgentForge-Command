<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     shape-rendering="crispEdges"
     role="img" aria-label="ECHO · Signal Bat mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36d6c3" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#36d6c3" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#36d6c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#36d6c3" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <!-- centred 32-unit canvas, scaled up ×5 to fill the 200-unit frame -->
  <g transform="translate(20,20) scale(5)" style="color:#36d6c3">
    
      <rect class="halo" x="2" y="2" width="28" height="28" fill="currentColor" opacity="0.165" rx="4"/>
      <g class="mascot-body"><rect x="1" y="12" width="11" height="7" fill="#312e81" class="r-wing-l"/><rect x="3" y="11" width="9" height="1" fill="#312e81" class="r-wing-l"/><rect x="5" y="19" width="7" height="1" fill="#312e81" class="r-wing-l"/><rect x="4" y="13" width="1" height="5" fill="#1e1b4b" class="r-wing-bone"/><rect x="7" y="13" width="1" height="5" fill="#1e1b4b" class="r-wing-bone"/><rect x="20" y="12" width="11" height="7" fill="#312e81" class="r-wing-r"/><rect x="20" y="11" width="9" height="1" fill="#312e81" class="r-wing-r"/><rect x="20" y="19" width="7" height="1" fill="#312e81" class="r-wing-r"/><rect x="24" y="13" width="1" height="5" fill="#1e1b4b" class="r-wing-bone"/><rect x="27" y="13" width="1" height="5" fill="#1e1b4b" class="r-wing-bone"/><rect x="12" y="10" width="8" height="12" fill="#1e1b4b" class="r-body"/><rect x="13" y="22" width="6" height="2" fill="#1e1b4b" class="r-body"/><rect x="14" y="24" width="4" height="1" fill="#1e1b4b" class="r-body"/><rect x="12" y="7" width="2" height="3" fill="#1e1b4b" class="r-ear"/><rect x="18" y="7" width="2" height="3" fill="#1e1b4b" class="r-ear"/><rect x="12" y="8" width="1" height="2" fill="#7c3aed" class="r-ear-in" opacity="0.6"/><rect x="19" y="8" width="1" height="2" fill="#7c3aed" class="r-ear-in" opacity="0.6"/><rect x="14" y="13" width="1" height="2" fill="#fca5a5" class="r-eye"/><rect x="17" y="13" width="1" height="2" fill="#fca5a5" class="r-eye"/><rect x="14" y="16" width="1" height="2" fill="#fff" class="r-fang"/><rect x="17" y="16" width="1" height="2" fill="#fff" class="r-fang"/></g>
      <g class="mascot-evo"><rect x="8" y="6" width="16" height="1" fill="currentColor" class="r-sonar s1" opacity="0.6"/><rect x="8" y="25" width="16" height="1" fill="currentColor" class="r-sonar s1" opacity="0.6"/><rect x="5" y="3" width="22" height="1" fill="currentColor" class="r-sonar s2" opacity="0.4"/><rect x="5" y="28" width="22" height="1" fill="currentColor" class="r-sonar s2" opacity="0.4"/><rect x="1" y="19" width="2" height="1" fill="currentColor" class="r-wing-tip"/><rect x="29" y="19" width="2" height="1" fill="currentColor" class="r-wing-tip"/><rect x="0" y="0" width="32" height="32" fill="currentColor" class="r-aura" opacity="0.08"/></g>
    
  </g>
  <text x="100" y="186" text-anchor="middle"
