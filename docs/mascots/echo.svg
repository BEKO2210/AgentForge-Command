<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     role="img" aria-label="ECHO · Signal Bat mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1224"/>
      <stop offset="100%" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#36d6c3" stop-opacity=".25"/>
      <stop offset="70%" stop-color="#36d6c3" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#36d6c3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="18" fill="none" stroke="#36d6c3" stroke-opacity=".35"/>
  <circle cx="100" cy="100" r="86" fill="url(#halo)"/>
  <g transform="translate(50,50) scale(1.0)" style="color:#36d6c3">
    
      <defs>
        <radialGradient id="halo-bat-5" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="currentColor" stop-opacity="0.27499999999999997"/>
          <stop offset="60%" stop-color="currentColor" stop-opacity="0.02"/>
          <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
        </radialGradient>
        <filter id="glow-bat-5" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle class="mascot-halo" cx="50" cy="52" r="46" fill="url(#halo-bat-5)"/>
      <g class="mascot-body" filter="url(#glow-bat-5)">
    <g class="m-bat">
      <path class="m-bat-wing l" d="M50 50l-32 -8l14 30z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path class="m-bat-wing-rib l" d="M50 50l-22 -4M50 50l-12 18" stroke="currentColor" stroke-width=".6" opacity=".5"/>
      <path class="m-bat-wing r" d="M50 50l32 -8l-14 30z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path class="m-bat-wing-rib r" d="M50 50l22 -4M50 50l12 18" stroke="currentColor" stroke-width=".6" opacity=".5"/>
      <ellipse class="m-bat-body" cx="50" cy="54" rx="6" ry="9" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle  class="m-bat-eye"  cx="48" cy="50" r="1.1" fill="currentColor"/>
      <circle  class="m-bat-eye"  cx="52" cy="50" r="1.1" fill="currentColor"/>
      <path    class="m-bat-fang" d="M48 56l1 3M52 56l-1 3" stroke="currentColor" stroke-width=".8"/>
